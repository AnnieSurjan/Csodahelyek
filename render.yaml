services:
  - type: web
    name: csodahelyek
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: csodahelyek-data
      mountPath: /data
      sizeGB: 1
